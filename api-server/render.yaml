services:
  - type: web
    name: benh-vien-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true       # Render tự sinh secret ngẫu nhiên
      - key: JWT_EXPIRES_IN
        value: 8h
      # FIREBASE_CREDENTIALS sẽ thêm thủ công trong Render Dashboard
      # (dán nội dung service-account.json vào đây)
